<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#fff;
}

img{
display:block;
width:100%;
height:auto;
}

.cover{
position:relative;
}

.open-btn{
position:absolute;
left:50%;
top:73%;
transform:translate(-50%,-50%);
width:230px;
height:70px;
cursor:pointer;
background:transparent;
border:none;
}

.page{
width:100%;
}

@media (max-width:768px){
.open-btn{
width:170px;
height:55px;
top:73%;
}
}
</style>

</head>

<body>

<div class="cover">
<img src="Cover.png.png">
<a href="#page1">
<button class="open-btn"></button>
</a>
</div>

<div id="page1" class="page">
<img src="page1.png.png">
</div>

<div class="page">
<img src="page2.png.png">
</div>

<div class="page">
<img src="page3.png.png">
</div>

<div class="page">
<img src="page4.png.png">
</div>

<div class="page">
<img src="page5.png.png">
</div>

<div class="page">
<img src="page6.png.png">
</div>

</body>
</html>
